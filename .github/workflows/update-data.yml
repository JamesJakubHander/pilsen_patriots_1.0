name: Update Patriots data

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Scrape CAAF and write data/patriots-data.json
        working-directory: scraper
        run: node scrape.mjs

      - name: Commit changes if the data moved
        run: |
          git config user.name  "patriots-bot"
          git config user.email "bot@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/patriots-data.json)" ]; then
            git add data/patriots-data.json
            git commit -m "chore: refresh Patriots data ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No data changes."
          fi
